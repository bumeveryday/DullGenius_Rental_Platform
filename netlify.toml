[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
  publish = "public"

# 로컬 개발 환경용 Redirect는 setupProxy.js가 처리하므로,
# 여기서는 Production 환경용 Redirect를 설정합니다.
# 하지만 Netlify Functions는 기본적으로 /.netlify/functions/ 경로로 접근 가능하므로
# 프론트엔드 api.js에서 경로를 분기처리하는 것이 더 명확합니다.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# PWA Service Worker는 항상 최신을 받아야 업데이트가 전파됨
# (CDN/브라우저 캐시가 옛 sw.js를 잡고 있으면 새 빌드가 키오스크에 적용 안 됨)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/registerSW.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
